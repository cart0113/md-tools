<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md-tools</title>
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <!-- base docsify layout (required for structure) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- theme -->
  <link rel="stylesheet" href="themes/code-one.css?v=20260323a">
  <!-- color palette overrides -->
  <link rel="stylesheet" href="themes/color-themes.css?v=20260323a">
  <!-- extension styles (indicator, collapsible folders, top nav, toggles) -->
  <link rel="stylesheet" href="themes/docsify-ext.css?v=20260323a">
  <!-- generated config (applies CSS classes before render) -->
  <script src="themes/docsify-ext-config.js?v=20260323a"></script>
  <!-- theme picker (applies saved choice before render) -->
  <script src="themes/theme-picker.js?v=20260323a"></script>
  <!-- code enhancements plugin (load before docsify) -->
  <script src="themes/code-enhancements.js?v=20260323a"></script>
  <!-- sidebar bar indicator (load before docsify) -->
  <script src="themes/sidebar-nav.js?v=20260323a"></script>
  <!-- collapsible folder sections -->
  <script src="themes/collapsible-folders.js?v=20260323a"></script>
  <!-- top-level folder navigation bar -->
  <script src="themes/top-nav.js?v=20260323a"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    var cfg = window.__docsifyExtConfig;
    window.$docsify = {
      name: 'md-tools',
      nameLink: '/#/0_overview/0_md-tools',
      homepage: '0_overview/0_md-tools.md',
      repo: cfg.github_corner ? 'https://github.com/cart0113/md-tools' : '',
      loadSidebar: true,
      subMaxLevel: cfg.document_header_depth,
      auto2top: true,
      search: {
        placeholder: 'Search docs',
        noData: 'No results.',
        depth: 3,
      },
      plugins: [
        codeEnhancementsPlugin,
        collapsibleFoldersPlugin,
        cfg.theme_picker ? themePickerPlugin : null,
        cfg.document_inline_sidebar_selector ? sidebarNavPlugin : null,
        cfg.top_level_folders_as_top_control ? topNavPlugin : null,
      ].filter(Boolean),
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Prism language support -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-rest.min.js"></script>
</body>
</html>
