<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md-tools</title>
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <!--
    THEME SELECTION
    ===============
    Swap the CSS file below to change themes:
      themes/graphite.css  — cool, technical (Tailwind / GitHub inspired)
      themes/inkwell.css   — warm, editorial (Stripe / Sphinx inspired)
  -->
  <link rel="stylesheet" href="themes/graphite.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'md-tools',
      nameLink: '/',
      repo: 'https://github.com/cart0113/md-tools',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search docs',
        noData: 'No results.',
        depth: 3,
      },
      plugins: [],
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
